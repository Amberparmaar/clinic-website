<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediCare Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      /* Enhanced Glassmorphism */
      .glass {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      }

      .glass-dark {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .hero-bg {
        background:
          linear-gradient(
            135deg,
            rgba(13, 148, 136, 0.85),
            rgba(15, 23, 42, 0.75)
          ),
          url("https://source.unsplash.com/random/1920x1080/?modern-clinic")
            center/cover no-repeat;
      }

      .service-card {
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .service-card:hover {
        transform: translateY(-15px) scale(1.03);
        box-shadow: 0 25px 60px -15px rgba(45, 212, 191, 0.25);
      }

      .nav-link {
        position: relative;
        transition: color 0.3s;
      }

      .nav-link:after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background: linear-gradient(to right, #14b8a6, #22d3ee);
        transition: width 0.4s ease;
      }

      .nav-link:hover:after {
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-white/40">
      <div
        class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-11 h-11 bg-gradient-to-br from-teal-500 to-cyan-400 rounded-2xl flex items-center justify-center shadow-inner"
          >
            <i class="fa-solid fa-heart-pulse text-white text-3xl"></i>
          </div>
          <h1
            class="text-3xl font-bold bg-gradient-to-r from-teal-700 to-cyan-600 bg-clip-text text-transparent"
          >
            MediCare
          </h1>
        </div>

        <nav
          class="hidden md:flex items-center gap-10 text-sm font-medium text-gray-700"
        >
          <a href="index.html" class="nav-link hover:text-teal-600">Home</a>
          <a href="about.html" class="nav-link hover:text-teal-600">About</a>
          <a href="services.html" class="nav-link hover:text-teal-600"
            >Services</a
          >
          <a href="contact.html" class="nav-link hover:text-teal-600"
            >Contact</a
          >
        </nav>

        <a
          href="#"
          onclick="showBookingModal()"
          class="hidden md:block bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white px-8 py-3.5 rounded-3xl font-semibold shadow-lg shadow-teal-500/40 transition-all"
        >
          Book Appointment
        </a>

        <button
          id="hamburgerBtn"
          class="md:hidden text-3xl text-gray-700 focus:outline-none"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>

      <!-- Mobile Menu -->
      <div
        id="mobileMenu"
        class="hidden md:hidden glass border-t border-white/30"
      >
        <div
          class="flex flex-col px-6 py-8 space-y-6 text-base font-medium text-gray-700"
        >
          <a href="index.html" class="hover:text-teal-600 transition">Home</a>
          <a href="about.html" class="hover:text-teal-600 transition">About</a>
          <a href="services.html" class="hover:text-teal-600 transition"
            >Services</a
          >
          <a href="contact.html" class="hover:text-teal-600 transition"
            >Contact</a
          >

          <div class="pt-6 border-t border-white/30">
            <a
              href="#"
              onclick="
                showBookingModal();
                toggleMobileMenu();
              "
              class="block bg-gradient-to-r from-teal-500 to-cyan-500 text-white py-4 text-center rounded-3xl font-semibold"
            >
              Book Appointment
            </a>
          </div>
        </div>
      </div>
    </header>

    <section class="container-xxl py-20">
      <div class="max-w-7xl mx-auto px-6">
        <div class="grid lg:grid-cols-2 gap-16">
          <!-- Contact Form -->
          <div>
            <h2 class="text-4xl font-bold mb-8">Get In Touch</h2>
            <form
              id="contactForm"
              onsubmit="handleContactForm(event)"
              class="space-y-6"
            >
              <div class="grid md:grid-cols-2 gap-6">
                <input
                  type="text"
                  id="cname"
                  placeholder="Your Name"
                  required
                  class="w-full px-6 py-4 border rounded-2xl focus:outline-none focus:border-teal-500"
                />
                <input
                  type="tel"
                  id="cphone"
                  placeholder="Phone Number"
                  required
                  class="w-full px-6 py-4 border rounded-2xl focus:outline-none focus:border-teal-500"
                />
              </div>
              <input
                type="email"
                id="cemail"
                placeholder="Email Address"
                required
                class="w-full px-6 py-4 border rounded-2xl focus:outline-none focus:border-teal-500"
              />
              <textarea
                id="cmessage"
                rows="6"
                placeholder="How can we help you?"
                required
                class="w-full px-6 py-4 border rounded-3xl focus:outline-none focus:border-teal-500"
              ></textarea>

              <button
                type="submit"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white py-4 rounded-2xl font-semibold text-lg transition"
              >
                Send Message
              </button>
            </form>
          </div>

          <!-- Contact Info + Map -->
          <div class="container-xxl space-y-10">
            <div>
              <h3 class="text-2xl font-semibold mb-6">Visit Our Clinic</h3>
              <div class="space-y-6">
                <div class="flex gap-4">
                  <i
                    class="fa-solid fa-location-dot text-2xl text-teal-600 mt-1"
                  ></i>
                  <div>
                    <p class="font-medium">123 Ocean View, Clifton Block 5</p>
                    <p class="text-gray-600">Karachi, Sindh, Pakistan</p>
                  </div>
                </div>
                <div class="flex gap-4">
                  <i class="fa-solid fa-phone text-2xl text-teal-600 mt-1"></i>
                  <div>
                    <p class="font-medium">+92 300 1234567</p>
                    <p class="text-gray-600">Emergency: +92 321 9876543</p>
                  </div>
                </div>
                <div class="flex gap-4">
                  <i
                    class="fa-solid fa-envelope text-2xl text-teal-600 mt-1"
                  ></i>
                  <p class="font-medium">info@medicareclinic.pk</p>
                </div>
              </div>
            </div>

            <!-- Google Maps Embed -->
            <div class="rounded-3xl overflow-hidden shadow-xl">
              <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3620.123456789!2d67.123456!3d24.856789!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjTCsDUxJzI0LjQiTiA2N8KwMDcnMzQuNiJF!5e0!3m2!1sen!2spk!4v1234567890"
                width="100%"
                height="380"
                style="border: 0"
                allowfullscreen=""
                loading="lazy"
              ></iframe>
            </div>

            <a
              href="https://wa.me/923001234567"
              target="_blank"
              class="flex items-center justify-center gap-3 bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-semibold text-lg transition"
            >
              <i class="fa-brands fa-whatsapp text-2xl"></i>
              Chat on WhatsApp
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 py-16">
      <!-- Same footer as previous pages -->
    </footer>

    <!-- Booking Modal -->
    <div
      id="bookingModal"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm"
    >
      <div class="glass rounded-3xl max-w-lg w-full mx-4 overflow-hidden">
        <div class="p-10">
          <div class="flex justify-between items-center mb-8">
            <h3 class="text-3xl font-semibold text-gray-900">
              Book Appointment
            </h3>
            <button
              onclick="hideBookingModal()"
              class="text-4xl text-gray-400 hover:text-gray-600 transition"
            >
              ×
            </button>
          </div>

          <form
            id="bookingForm"
            onsubmit="handleBooking(event)"
            class="space-y-6"
          >
            <input
              type="text"
              id="name"
              placeholder="Full Name"
              required
              class="w-full px-6 py-4 bg-white/70 border border-white/60 rounded-2xl focus:outline-none focus:border-teal-400 placeholder-gray-500"
            />

            <input
              type="tel"
              id="phone"
              placeholder="Phone Number"
              required
              class="w-full px-6 py-4 bg-white/70 border border-white/60 rounded-2xl focus:outline-none focus:border-teal-400 placeholder-gray-500"
            />

            <input
              type="email"
              id="email"
              placeholder="Email Address"
              class="w-full px-6 py-4 bg-white/70 border border-white/60 rounded-2xl focus:outline-none focus:border-teal-400 placeholder-gray-500"
            />

            <select
              id="service"
              class="w-full px-6 py-4 bg-white/70 border border-white/60 rounded-2xl focus:outline-none focus:border-teal-400 text-gray-700"
            >
              <option value="">Select Service</option>
              <option value="Dental">Dental Care</option>
              <option value="Skin">Skin & Aesthetics</option>
              <option value="General">General Checkup</option>
            </select>

            <input
              type="date"
              id="date"
              class="w-full px-6 py-4 bg-white/70 border border-white/60 rounded-2xl focus:outline-none focus:border-teal-400"
            />

            <textarea
              id="message"
              rows="4"
              placeholder="Additional notes..."
              class="w-full px-6 py-4 bg-white/70 border border-white/60 rounded-3xl focus:outline-none focus:border-teal-400 placeholder-gray-500"
            ></textarea>

            <button
              type="submit"
              class="w-full bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white py-4 rounded-3xl font-semibold text-lg transition-all shadow-lg"
            >
              Confirm Appointment
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
